# Sets the "Build version" shown in the Central Dashboard user interface.
#
# The dashboard backend (getKubeflowVersion in k8s_service.ts) lists Application
# custom resources in the kubeflow namespace and reads spec.descriptor.version of
# the one whose spec.descriptor.type matches "kubeflow" (case-insensitive). It
# exposes that value as platformInfo.kubeflowVersion. The frontend (main-page.js)
# then replaces the label that is baked into the image at build time (otherwise
# "no-tag") with this version. Without this resource the backend returns
# "unknown" and the dashboard keeps displaying "no-tag".
#
# This requires the applications.app.k8s.io CustomResourceDefinition. This overlay
# pulls it in via ../upstream/third-party/application/cluster-scoped.
# The dashboard Role already grants get/list/watch on applications.
apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: kubeflow
  namespace: kubeflow
spec:
  descriptor:
    type: kubeflow
    version: "26.03.1"
