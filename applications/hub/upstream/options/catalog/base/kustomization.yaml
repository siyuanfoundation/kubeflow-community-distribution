apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- deployment.yaml
- service.yaml
- postgres-statefulset.yaml
- postgres-service.yaml

configMapGenerator:
- behavior: create
  files:
  - sources.yaml
  name: model-catalog-sources
  options:
    disableNameSuffixHash: true
- behavior: create
  files:
  - sources.yaml=mcp-sources.yaml
  name: mcp-catalog-sources
  options:
    disableNameSuffixHash: true

secretGenerator:
- envs:
  - postgres.env
  name: model-catalog-postgres
  options:
    disableNameSuffixHash: true
- envs:
  - hf-api-key.env
  name: model-catalog-hf-api-key
  options:
    disableNameSuffixHash: true
images:
- name: ghcr.io/kubeflow/hub/server
  newName: ghcr.io/kubeflow/hub/server
  newTag: v0.3.14
