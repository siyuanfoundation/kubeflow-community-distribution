catalogs:
  - name: Red Hat AI
    id: redhat_ai
    enabled: true
    type: yaml
    properties:
      yamlCatalogPath: /shared-data/catalog/models-catalog.yaml
    labels:
      - Red Hat AI
  - name: Red Hat AI validated
    id: redhat_ai_validated
    enabled: true
    type: yaml
    properties:
      yamlCatalogPath: /shared-data/catalog/validated-models-catalog.yaml
    labels:
      - Red Hat AI validated
labels:
  - name: Red Hat AI validated
    displayName: Red Hat AI - validated models
    description: Third-party models verified by Red Hat to ensure reliable performance and compatibility. Some of these include validated runtime arguments for enabling additional capabilities.
  - name: Red Hat AI
    description: Red Hat models with full support and legal indemnification.
  - name: null
    displayName: Community and custom
    description: A broad collection of third-party, community, and admin-configured models.
namedQueries:
  default-performance-filters:
    assetType: models
    filters:
      "artifacts.use_case.string_value":
        operator: "="
        value: chatbot
      "artifacts.requests_per_second.double_value":
        operator: "<="
        value: 1
      "artifacts.ttft_p90.double_value":
        operator: "<="
        value: max
