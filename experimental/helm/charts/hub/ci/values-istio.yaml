# CI values for testing Istio service mesh integration

server:
  enabled: false
  
istio:
  enabled: true
  
  virtualService:
    enabled: true
    hosts: 
    - "*"
    gateways:
    - "kubeflow-gateway"
    
  destinationRule:
    enabled: true
    trafficPolicy:
      tls:
        mode: ISTIO_MUTUAL
        
  authorizationPolicy:
    enabled: true
    selector:
      matchLabels:
        component: model-registry-server
    rules:
    - from:
      - source:
          principals:
          - cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account
    - from:
      - source:
          namespaces:
          - "kubeflow"
      when:
      - key: request.headers[authorization]
        values:
        - "*"
      - key: request.headers[kubeflow-userid]
        notValues:
        - "*"
          
  gateway:
    enabled: false
    
database:
  type: external
  mysql:
    enabled: false
  postgres:
    enabled: false
  external:
    enabled: false
  
ui:
  enabled: false
  
controller:
  enabled: false
  rbac:
    create: false
  
monitoring:
  enabled: false
  
storage:
  csi:
    enabled: false
