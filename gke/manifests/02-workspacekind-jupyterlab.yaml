apiVersion: kubeflow.org/v1beta1
kind: WorkspaceKind
metadata:
  name: jupyterlab
spec:
  spawner:
    displayName: "JupyterLab Notebook"
    description: "A Workspace running JupyterLab with Ray SDK in a Pod"
    hidden: false
    deprecated: false
    icon:
      url: "https://jupyter.org/assets/favicons/apple-touch-icon-152x152.png"
    logo:
      url: "https://upload.wikimedia.org/wikipedia/commons/3/38/Jupyter_logo.svg"
  podTemplate:
    serviceAccount:
      name: "default-editor"
    culling:
      enabled: false
      activityProbe:
        jupyter:
          lastActivity: true
    volumeMounts:
      home: "/home/jovyan"
    ports:
      - id: "jupyterlab"
        defaultDisplayName: "JupyterLab"
        protocol: "HTTP"
        httpProxy:
          removePathPrefix: false
    extraEnv:
      - name: "NB_PREFIX"
        value: |-
          {{ httpPathPrefix "jupyterlab" }}
    extraVolumeMounts:
      - name: "dshm"
        mountPath: "/dev/shm"
    extraVolumes:
      - name: "dshm"
        emptyDir:
          medium: "Memory"
    securityContext:
      fsGroup: 100
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
    options:
      imageConfig:
        spawner:
          default: "jupyter-custom"
        values:
          - id: "jupyter-custom"
            spawner:
              displayName: "Jupyter Custom (with Ray SDK)"
              description: "JupyterLab with Ray and Kubernetes Python SDKs"
            spec:
              image: "us-west1-docker.pkg.dev/sizhang-gke-dev/sizhang-repo/jupyter-custom:v1"
              imagePullPolicy: "Always"
              ports:
                - id: "jupyterlab"
                  port: 8888
          - id: "jupyter-scipy:v1.10.0"
            spawner:
              displayName: "jupyter-scipy:v1.10.0"
              description: "JupyterLab, with SciPy Packages"
            spec:
              image: "ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-scipy:v1.10.0"
              imagePullPolicy: "IfNotPresent"
              ports:
                - id: "jupyterlab"
                  port: 8888
      podConfig:
        spawner:
          default: "small_cpu"
        values:
          - id: "tiny_cpu"
            spawner:
              displayName: "Tiny CPU"
              description: "Pod with 0.1 CPU, 128 Mb RAM"
            spec:
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
          - id: "small_cpu"
            spawner:
              displayName: "Small CPU"
              description: "Pod with 0.5 CPU, 1 GB RAM"
            spec:
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
