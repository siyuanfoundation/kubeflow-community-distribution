name: Check if the upstream synchronization is idempotent
on:
  pull_request:

permissions:
  contents: read

jobs:
  upstream_synchronization_idempotence_test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Setup python 3.13
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: "3.13"

    - name: Install Python dependencies
      run: python -m pip install ruamel.yaml==0.19.1

    - name: Run upstream synchronization scripts for changed files
      run: |
        mapfile -t changed_files < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
        tests/resynchronize-upstream-changes.py "${changed_files[@]}"

    - name: Check that the upstream synchronization is idempotent
      run: |
        # Stage every path so the line-ending normalization mandated by
        # .gitattributes (text=auto eol=lf) is applied before comparison.
        # Some upstream repositories ship files with CRLF line terminators;
        # once normalized to LF they are byte-identical to the committed
        # blobs, so comparing the staged tree against HEAD detects only
        # genuine content, addition or removal changes and ignores the
        # renormalization that "git status --porcelain" would flag falsely.
        git add --all
        if git diff --cached --quiet; then
            echo "No changes detected, upstream synchronization is idempotent"
        else
            echo "Upstream synchronization introduced changes, synchronization is not idempotent:"
            git diff --cached
            exit 1
        fi
