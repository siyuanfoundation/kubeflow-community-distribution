name: Image Extracting and Security Scanning

on:
  workflow_dispatch:
  push:
    branches:
    - master
  pull_request:
    paths:
    - tests/kustomize_install.sh
    - .github/workflows/osv-scanner.yaml
    - tests/osv_scanner_scan.py
    - tests/osv_scanner_install.sh

permissions:
  contents: read
  actions: read

jobs:
  osv-scanner:
    if: ${{ github.repository == 'kubeflow/community-distribution' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    # Install kustomize
    - name: Install kustomize
      run: |
        bash tests/kustomize_install.sh

    # Install osv-scanner
    - name: Install osv-scanner
      run: |
        bash tests/osv_scanner_install.sh

    # Install Python
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'

    # Install prettytable package
    - name: Install prettytable
      run: |
        pip install prettytable

    - name: Run image extracting and security scanning script
      run: |
        cd tests
        python3 osv_scanner_scan.py

    - name: Upload osv-scanner scanned_results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: osv_scanner_scanned_results
        path: image_lists/
