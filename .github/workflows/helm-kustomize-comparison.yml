name: Helm vs Kustomize Comparison

on:
  pull_request:
    paths:
    - experimental/helm/charts/**
    - applications/hub/**
    - applications/kserve/kserve-ui/**
    - common/cert-manager/**
    - common/kubeflow-namespace/**
    - common/kubeflow-roles/**
    - scripts/synchronize-cert-manager-manifests.sh
    - scripts/synchronize-hub-manifests.sh
    - tests/kustomize_install.sh
    - tests/helm_kustomize_compare.py
    - tests/helm_kustomize_compare.sh
    - tests/helm_kustomize_compare_all.sh
    - .github/workflows/helm-kustomize-comparison.yml
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  validate-helm-kustomize-equivalence:
    continue-on-error: true
    runs-on: ubuntu-latest
    name: Compare All Scenarios
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.12'
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
    - name: Install Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      with:
        version: v4.2.2
    - name: Install Kustomize
      run: ./tests/kustomize_install.sh
    - name: Run all scenarios comparison
      env:
        VERBOSE: "true"
      run: |
        ./tests/helm_kustomize_compare_all.sh
